<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Image Template</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 1200px;
            height: 630px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            color: white;
        }
        .container {
            text-align: center;
            padding: 60px;
        }
        h1 {
            font-size: 72px;
            font-weight: 700;
            margin: 0 0 20px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        .subtitle {
            font-size: 36px;
            font-weight: 400;
            margin: 0 0 40px 0;
            opacity: 0.95;
        }
        .platforms {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            max-width: 900px;
        }
        .platform {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 24px;
            font-weight: 500;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        .footer {
            margin-top: 40px;
            font-size: 20px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍎 Public Apple Frameworks</h1>
        <div class="subtitle">Complete reference for all Apple frameworks</div>
        <div class="platforms">
            <div class="platform">iOS</div>
            <div class="platform">macOS</div>
            <div class="platform">watchOS</div>
            <div class="platform">tvOS</div>
            <div class="platform">visionOS</div>
            <div class="platform">macCatalyst</div>
            <div class="platform">iPadOS</div>
        </div>
        <div class="footer">Filterable table • Platform availability • Version tracking</div>
    </div>
</body>
</html>
